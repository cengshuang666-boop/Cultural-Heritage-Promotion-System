<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文博AI宣传视频平台 - 质量评价</title>
  <style>
    :root {
      --bg-deep: #0d1117; --bg-card: #161b22; --bg-hover: #21262d; --border: #30363d;
      --text-primary: #c9d1d9; --text-secondary: #8b949e; --accent: #2f81f7; --accent-hover: #58a6ff;
      --green: #238636; --green-text: #3fb950; --red: #da3633; --yellow: #9e8c00; --yellow-text: #d29922;
      --tag-bg: rgba(47,129,247,0.15); --sidebar-active: rgba(47,129,247,0.12);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,"Noto Sans SC",sans-serif; background:var(--bg-deep); color:var(--text-primary); font-size:14px; }
    a { text-decoration:none; color:inherit; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:56px; background:var(--bg-card); border-bottom:1px solid var(--border); position:fixed; top:0; left:0; right:0; z-index:100; }
    .topbar-left { display:flex; align-items:center; gap:32px; }
    .logo { display:flex; align-items:center; gap:8px; font-size:16px; font-weight:600; }
    .logo-icon { width:28px; height:28px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .topnav { display:flex; gap:28px; }
    .topnav a { font-size:14px; color:var(--text-secondary); padding:18px 0; border-bottom:2px solid transparent; transition:.2s; }
    .topnav a:hover, .topnav a.active { color:var(--text-primary); border-bottom-color:var(--accent); }
    .topbar-right { display:flex; align-items:center; gap:12px; color:var(--text-secondary); font-size:13px; }
    .user-avatar { width:28px; height:28px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:12px; }

    .sidebar { position:fixed; top:56px; left:0; width:210px; height:calc(100vh - 56px); background:var(--bg-card); border-right:1px solid var(--border); overflow-y:auto; z-index:90; }
    .sidebar-group { padding:12px 0; border-bottom:1px solid var(--border); }
    .sidebar-item { display:flex; align-items:center; gap:10px; padding:10px 20px; font-size:13px; color:var(--text-secondary); cursor:pointer; transition:.15s; white-space:nowrap; }
    .sidebar-item:hover { background:var(--bg-hover); color:var(--text-primary); }
    .sidebar-item.active { background:var(--sidebar-active); color:var(--accent-hover); border-left:3px solid var(--accent); padding-left:17px; }
    .sidebar-item svg { width:16px; height:16px; flex-shrink:0; }

    .main { margin-left:210px; margin-top:56px; padding:24px; min-height:calc(100vh - 56px); }
    .content { max-width:1100px; margin:0 auto; }

    .page-title { font-size:22px; font-weight:600; margin-bottom:4px; }
    .page-desc { color:var(--text-secondary); font-size:13px; margin-bottom:24px; }

    .panel { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:20px; }
    .panel-title { font-size:16px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }

    .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:6px; font-size:13px; cursor:pointer; border:none; transition:.15s; font-weight:500; }
    .btn-primary { background:var(--accent); color:#fff; }
    .btn-primary:hover { background:var(--accent-hover); }
    .btn-secondary { background:var(--bg-hover); color:var(--text-primary); border:1px solid var(--border); }
    .btn-sm { padding:5px 12px; font-size:12px; }

    .id-selector { padding:8px 14px; background:var(--bg-hover); border:1px solid var(--border); border-radius:6px; color:var(--text-primary); font-size:13px; outline:none; cursor:pointer; min-width:260px; }
    .id-selector:focus { border-color:var(--accent); }
    .id-selector option { background:var(--bg-card); color:var(--text-primary); }

    .score-cards { display:grid; grid-template-columns:repeat(4, 1fr); gap:16px; margin-bottom:20px; }
    .score-card { background:var(--bg-hover); border-radius:10px; padding:20px; text-align:center; border:2px solid transparent; transition:.2s; }
    .score-card:hover { border-color:var(--accent); transform:translateY(-2px); }
    .score-value { font-size:32px; font-weight:700; margin-bottom:4px; }
    .score-value.excellent { color:var(--green-text); }
    .score-value.good { color:var(--accent-hover); }
    .score-value.avg { color:var(--yellow-text); }
    .score-value.poor { color:var(--red); }
    .score-label { font-size:13px; color:var(--text-secondary); }
    .score-detail { font-size:11px; color:var(--text-secondary); margin-top:4px; }

    .chart-area { background:var(--bg-deep); border-radius:10px; padding:20px; height:280px; position:relative; overflow:hidden; }
    .chart-canvas { width:100%; height:100%; }

    .detail-table { width:100%; border-collapse:collapse; }
    .detail-table th { text-align:left; padding:12px 16px; font-size:12px; color:var(--text-secondary); font-weight:500; border-bottom:1px solid var(--border); text-transform:uppercase; letter-spacing:0.5px; }
    .detail-table td { padding:14px 16px; font-size:13px; border-bottom:1px solid var(--border); }
    .detail-table tr:hover { background:var(--bg-hover); }
    .detail-table tr:last-child td { border-bottom:none; }
    .bar-track { width:100%; max-width:200px; height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .bar-fill { height:100%; border-radius:3px; transition:width 0.5s; }
    .bar-fill.green { background:var(--green); }
    .bar-fill.blue { background:var(--accent); }
    .bar-fill.yellow { background:var(--yellow-text); }
    .bar-fill.red { background:var(--red); }
    .score-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; }
    .badge-green { background:rgba(35,134,54,0.15); color:var(--green-text); }
    .badge-blue { background:var(--tag-bg); color:var(--accent-hover); }
    .badge-yellow { background:rgba(217,165,20,0.15); color:var(--yellow-text); }
    .badge-red { background:rgba(218,54,51,0.15); color:var(--red); }

    .report-card { background:var(--bg-hover); border-radius:10px; padding:20px; }
    .report-title { font-size:14px; font-weight:600; margin-bottom:12px; }
    .report-item { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .report-item:last-child { border-bottom:none; }
    .report-item .label { color:var(--text-secondary); }
    .report-item .value { font-weight:500; }
    .report-item .value.green { color:var(--green-text); }
    .report-item .value.yellow { color:var(--yellow-text); }
  </style>
</head>

<main class="main">
  <div class="content">
    <h1 class="page-title">质量评价</h1>
    <p class="page-desc">对AI生成的视频、音频、字幕进行多维度质量评分与可视化分析</p>

    <div class="panel">
      <div class="panel-title" style="flex-wrap:wrap; gap:12px;">
        <span id="scoreTitle">📊 综合质量评分</span>
        <select class="id-selector" id="contentSelect" onchange="switchContent(this.value)">
          <option value="">选择内容查看质量报告...</option>
        </select>

        <div class="score-card">
          <div class="score-value excellent" id="scoreOverall">92</div>
          <div class="score-label">综合评分</div>

        </div>
        <div class="score-card">
          <div class="score-value good" id="scoreVisual">87</div>

        </div>
        <div class="score-card">
          <div class="score-value excellent" id="scoreAudio">95</div>
          <div class="score-label">音频质量</div>
          <div class="score-detail" id="labelAudio">发音清晰 · 自然流畅</div>
        </div>
        <div class="score-card">
          <div class="score-value good" id="scoreSync">88</div>

          <!-- JS填充 -->
        </tbody>
      </table>

<script>
  // ========== 数据定义 ==========
  const staticItems = [
    {id:'WB-20260708-003', title:'宋代书画科普', type:'科普短片'},
    {id:'WB-20260708-006', title:'汉代玉器鉴赏', type:'文物讲解'},
    {id:'WB-20260708-007', title:'陶瓷艺术展预告', type:'展览预告'},
    {id:'WB-20260708-005', title:'唐代瓷器展厅导览', type:'博物馆导览'},
    {id:'WB-20260708-004', title:'青铜鼎文物讲解', type:'文物讲解'},
    {id:'WB-20260708-002', title:'明清家具介绍', type:'科普短片'},
    {id:'WB-20260707-001', title:'历史故事：丝绸之路', type:'历史故事'},
    {id:'WB-20260707-002', title:'特展预告片', type:'展览预告'},
  ];

  function getAllItems() {
    const stored = JSON.parse(localStorage.getItem('wenbo_audit_items') || '[]');
    const map = new Map();
    staticItems.forEach(it => map.set(it.id, it));
    stored.forEach(it => { if (!map.has(it.id)) map.set(it.id, it); });
    return Array.from(map.values());
  }

  // ========== 评分引擎 ==========
  function hashId(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = ((h << 5) - h) + str.charCodeAt(i);
    return Math.abs(h);
  }
  function seededRandom(seed) {
    const x = Math.sin(seed++) * 10000;
    return x - Math.floor(x);
  }
  function genScore(id, idx) {
    const base = hashId(id);
    return Math.floor(75 + seededRandom(base + idx) * 23);
  }
  function getScores(id) {
    return {
      overall: genScore(id, 0), visual: genScore(id, 1), audio: genScore(id, 2), sync: genScore(id, 3),
      clarity: genScore(id, 4), render: genScore(id, 5), accuracy: genScore(id, 6), natural: genScore(id, 7),
      lipSync: genScore(id, 8), subtitleAlign: genScore(id, 9), history: genScore(id, 10),
      narrative: genScore(id, 11), bgQuality: genScore(id, 12), watermark: 100
    };
  }

  // ========== 工具函数 ==========
  function getLabel(score) {
    if (score >= 90) return '优秀';
    if (score >= 80) return '良好';
    if (score >= 70) return '一般';
    return '待改进';
  }
  function getBadgeClass(score) {
    if (score >= 90) return 'badge-green';
    if (score >= 80) return 'badge-blue';
    if (score >= 70) return 'badge-yellow';
    return 'badge-red';
  }
  function getScoreClass(score) {
    if (score >= 90) return 'excellent';
    if (score >= 80) return 'good';
    if (score >= 70) return 'avg';
    return 'poor';
  }
  function getBarClass(score) {
    if (score >= 90) return 'green';
    if (score >= 80) return 'blue';
    if (score >= 70) return 'yellow';
    return 'red';
  }

  // ========== 选择器初始化 ==========
  function initSelector(selectedId) {
    const sel = document.getElementById('contentSelect');
    const items = getAllItems();
    sel.innerHTML = '<option value="">选择内容查看质量报告...</option>' +
      items.map(it => `<option value="${it.id}" ${it.id === selectedId ? 'selected' : ''}>${it.id} · ${it.title} · ${it.type}</option>`).join('');
  }

  // ========== 渲染质量报告 ==========
  let currentScores = null;

  function switchContent(id) {
    if (!id) return;
    // 更新URL但不刷新
    const url = new URL(window.location.href);
    url.searchParams.set('id', id);
    window.history.replaceState({}, '', url);
    renderQuality(id);
  }

  function renderQuality(id) {
    currentScores = getScores(id);
    const item = getAllItems().find(it => it.id === id) || {title:'', type:''};

    document.getElementById('scoreTitle').textContent = '📊 综合质量评分 - ' + id;

    // 更新四张卡片
    updateCard('scoreOverall', currentScores.overall, getLabel(currentScores.overall));
    updateCard('scoreVisual', currentScores.visual, '渲染精细 · 色彩准确');
    updateCard('scoreAudio', currentScores.audio, '发音清晰 · 自然流畅');
    updateCard('scoreSync', currentScores.sync, '唇形对齐 · 时间准确');

    // 详细评分表
    const dims = [
      {name:'画面清晰度', score:currentScores.clarity},
      {name:'数字人渲染质量', score:currentScores.render},
      {name:'文物还原准确度', score:currentScores.accuracy},
      {name:'语音自然度', score:currentScores.natural},
      {name:'唇形同步精度', score:currentScores.lipSync},
      {name:'字幕时间对齐', score:currentScores.subtitleAlign},
      {name:'内容历史准确性', score:currentScores.history},
      {name:'叙事流畅度', score:currentScores.narrative},
      {name:'背景画面质量', score:currentScores.bgQuality},
      {name:'水印标识合规', score:currentScores.watermark},
    ];

    document.getElementById('detailBody').innerHTML = dims.map(d => `
      <tr><td>${d.name}</td><td>${d.score}/100</td>
      <td><div class="bar-track"><div class="bar-fill ${getBarClass(d.score)}" style="width:${d.score}%"></div></div></td>
      <td><span class="score-badge ${getBadgeClass(d.score)}">${getLabel(d.score)}</span></td></tr>
    `).join('');

    // 优势/劣势卡片
    const sorted = [...dims].sort((a,b) => b.score - a.score);
    const advantages = sorted.slice(0, 4);
    const weaknesses = sorted.slice(-3).reverse();

    document.getElementById('reportArea').innerHTML = `
      <div class="report-card">
        <div class="report-title">✅ 优势项</div>
        ${advantages.map(d => `<div class="report-item"><span class="label">${d.name}</span><span class="value green">${d.score}/100</span></div>`).join('')}
      </div>
      <div class="report-card">
        <div class="report-title">⚠️ 待优化项</div>
        ${weaknesses.map(d => `<div class="report-item"><span class="label">${d.name}</span><span class="value ${d.score >= 80 ? 'green' : 'yellow'}">${d.score}/100</span></div>`).join('')}
      </div>
    `;

    drawRadar();

    // 数字递增动画
    animateNumber('scoreOverall', currentScores.overall);
    animateNumber('scoreVisual', currentScores.visual);
    animateNumber('scoreAudio', currentScores.audio);
    animateNumber('scoreSync', currentScores.sync);
  }

  function updateCard(id, score, detail) {
    const el = document.getElementById(id);
    el.textContent = score;
    el.className = 'score-value ' + getScoreClass(score);
    const detailEl = document.getElementById('label' + id.replace('score',''));
    if (detailEl) detailEl.textContent = detail;
  }

  function animateNumber(id, target) {
    const el = document.getElementById(id);
    let current = 0;
    const step = () => {
      current += Math.ceil(target / 30);
      if (current > target) current = target;
      el.textContent = current;
      if (current < target) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  // ========== 雷达图 ==========
  function drawRadar() {
    const canvas = document.getElementById('radarChart');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);

    const w = rect.width, h = rect.height;
    const cx = w / 2, cy = h / 2;
    const radius = Math.min(w, h) * 0.35;
    const labels = ['画面质量', '音频质量', '同步精度', '内容准确', '字幕对齐', '叙事流畅'];
    const values = currentScores ? [currentScores.visual, currentScores.audio, currentScores.sync, currentScores.history, currentScores.subtitleAlign, currentScores.narrative] : [87, 95, 88, 85, 91, 93];
    const n = labels.length;

    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 1;
    for (let i = 1; i <= 5; i++) {
      ctx.beginPath();
      for (let j = 0; j <= n; j++) {
        const angle = (Math.PI * 2 * j / n) - Math.PI / 2;
        const r = radius * (i / 5);
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
    }

    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius);
      ctx.stroke();

      const lx = cx + Math.cos(angle) * (radius + 28);
      const ly = cy + Math.sin(angle) * (radius + 28);
      ctx.fillStyle = '#8b949e';
      ctx.font = '13px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(labels[i], lx, ly);
    }

    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const angle = (Math.PI * 2 * (i % n) / n) - Math.PI / 2;
      const r = radius * (values[i % n] / 100);
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.fillStyle = 'rgba(47,129,247,0.2)';
    ctx.fill();
    ctx.strokeStyle = '#2f81f7';
    ctx.lineWidth = 2;
    ctx.stroke();

    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const r = radius * (values[i] / 100);
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#2f81f7';
      ctx.fill();
      ctx.strokeStyle = '#0d1117';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // ========== 初始化 ==========
  function initQuality() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || 'WB-20260708-006';
    initSelector(id);
    renderQuality(id);
  }

  initQuality();
  window.addEventListener('resize', drawRadar);
</script>
